<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Crawler Health Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap');

        :root {
            --bg-dark: #020b14;
            --panel-bg: #03111e;
            --neon-cyan: #4ef2d2;
            --active-blue: #1fa2ff;
            --neon-glow: 0 0 15px rgba(78, 242, 210, 0.6);
            --text-muted: #4e6b82;
            --btn-dark: #122230;
            --btn-border: #1a354b;
            --hud-line-blue: #103b5c;
            --neon-red: #ff4a4a;
            --red-glow: 0 0 12px rgba(255, 74, 74, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 40%, #061c2e 0%, #020b14 80%);
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .hud-container {
            width: 100%;
            max-width: 460px;
            background-color: var(--panel-bg);
            border: 2px solid #09253d;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        /* ----------------------------------------------------
           EXACT IMAGE HEADER SEGMENT DESIGN
        ---------------------------------------------------- */
        .hud-header-segment {
            width: 100%;
            position: relative;
            margin-bottom: 24px;
            text-align: center;
            padding-bottom: 12px;
        }

        .hud-header-segment::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: -24px;
            right: -24px;
            height: 14px;
            background: var(--hud-line-blue);
            clip-path: polygon(
                0% 0%, 5% 0%, 8% 50%, 15% 50%, 17% 0%, 
                83% 0%, 85% 50%, 92% 50%, 95% 0%, 100% 0%,
                100% 15%, 94% 15%, 91% 65%, 84% 65%, 82% 15%,
                18% 15%, 16% 65%, 9% 65%, 6% 15%, 0% 15%
            );
            box-shadow: 0 0 10px rgba(31, 162, 255, 0.3);
        }

        .header-glow-bar {
            position: absolute;
            bottom: -1px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan) 20%, var(--neon-cyan) 80%, transparent);
            box-shadow: 0 0 8px var(--neon-cyan);
            z-index: 2;
        }

        .hud-title {
            font-size: 2.3rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #ffffff;
            text-transform: uppercase;
            line-height: 1;
        }

        .hud-subtitle {
            font-size: 0.8rem;
            font-weight: 700;
            color: #7fa1bccc;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 6px;
            position: relative;
            z-index: 2;
        }

        /* Health Bar Element */
        .bar-outer-frame {
            border: 2px solid #0f3554;
            padding: 2px;
            border-radius: 6px;
            background: #01070d;
            margin-bottom: 16px;
        }

        .bar-container {
            background-color: #041424;
            height: 24px;
            width: 100%;
            position: relative;
            border-radius: 3px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #166088 0%, var(--neon-cyan) 100%);
            box-shadow: 0 0 15px rgba(78, 242, 210, 0.4);
            transition: width 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .bar-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1.5px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }

        /* Giant Numeric Readout */
        .big-hp-display {
            font-size: 4.5rem;
            font-weight: 800;
            text-align: center;
            color: var(--neon-cyan);
            text-shadow: var(--neon-glow);
            margin-bottom: 12px;
            line-height: 1;
        }

        /* Quick Actions Segment Styles */
        .quick-damage-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .quick-heal-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .damage-btn {
            background-color: #240c11;
            border: 2px solid #4a151f;
            border-radius: 6px;
            color: #ff9494;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 700;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            flex: 1;
            max-width: 70px;
            text-align: center;
        }

        .damage-btn:hover {
            border-color: var(--neon-red);
            color: #ffffff;
            box-shadow: var(--red-glow);
            background-color: #3d121a;
        }

        .damage-btn:active {
            transform: scale(0.95);
        }

        .heal-btn {
            background-color: #0b211d;
            border: 2px solid #144037;
            border-radius: 6px;
            color: #a3f7e6;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 700;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            flex: 1;
            max-width: 70px;
            text-align: center;
        }

        .heal-btn:hover {
            border-color: var(--neon-cyan);
            color: #ffffff;
            box-shadow: var(--neon-glow);
            background-color: #174d42;
        }

        .heal-btn:active {
            transform: scale(0.95);
        }

        .grid-section-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 14px;
        }

        /* Core 1 to 20 Grid setup */
        .health-matrix-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .matrix-cell {
            background-color: var(--btn-dark);
            border: 2px solid var(--btn-border);
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 1.5rem;
            font-weight: 700;
            padding: 12px 0;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .matrix-cell:hover {
            border-color: var(--neon-cyan);
            color: #ffffff;
        }

        .matrix-cell.lit {
            background-color: #052632;
            border-color: var(--neon-cyan);
            color: #ffffff;
            box-shadow: inset 0 0 10px rgba(78, 242, 210, 0.2);
        }

        .matrix-cell.active-peak {
            background-color: #093c4e;
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            text-shadow: var(--neon-glow);
            box-shadow: inset 0 0 15px rgba(78, 242, 210, 0.4), var(--neon-glow);
        }

        /* Lower Log Console Section - Adjusted for a slimmer layout */
        .console-box {
            background: #020912;
            border: 2px solid #0a2136;
            border-radius: 8px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 74px;
            margin-bottom: 24px;
        }

        .console-meta {
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 50%;
        }

        .console-sub-heading {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 1.5px;
        }

        .reset-action-trigger {
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 6px;
            text-align: left;
            text-decoration: underline;
            width: fit-content;
        }

        .reset-action-trigger:hover {
            color: var(--neon-cyan);
        }

        .console-feed-column {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            width: 50%;
            border-left: 2px solid #0a2136;
            padding-left: 16px;
            height: 52px;
            overflow-y: auto;
        }

        .feed-row-item {
            font-size: 1rem;
            font-weight: 700;
            color: #ff4a4a;
            text-shadow: 0 0 5px rgba(255, 74, 74, 0.2);
            opacity: 0.9;
            animation: itemArrival 0.2s ease-out forwards;
        }

        .feed-row-void {
            font-size: 0.8rem;
            color: #112a3d;
            font-style: italic;
            margin-top: 16px;
        }

        /* New Match Record Counters Section */
        .match-counters-box {
            background: #020b14;
            border: 2px solid #0b253c;
            border-radius: 8px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .counter-widget {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #041322;
            border: 1px solid #13334f;
            border-radius: 6px;
            padding: 6px 12px;
            flex: 1;
        }

        .counter-label {
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .counter-label.win { color: var(--neon-cyan); }
        .counter-label.loss { color: #ff6b6b; }

        .counter-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .counter-btn {
            background: #0c2033;
            border: 1px solid #1c4366;
            color: #ffffff;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 700;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
        }

        .counter-btn:hover {
            background: #173b5e;
            border-color: var(--active-blue);
        }

        .counter-value {
            font-size: 1.2rem;
            font-weight: 800;
            min-width: 20px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        @keyframes itemArrival {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 0.9; transform: translateY(0); }
        }

        .console-feed-column::-webkit-scrollbar { width: 3px; }
        .console-feed-column::-webkit-scrollbar-thumb { background: #0f3554; }
    </style>
</head>
<body>

    <div class="hud-container">
        
        <div class="hud-header-segment">
            <div class="hud-title">HEALTH TRACKER</div>
            <div class="hud-subtitle">SINGLE PLAYER DUNGEON CRAWLER</div>
            <div class="header-glow-bar"></div>
        </div>

        <div class="bar-outer-frame">
            <div class="bar-container">
                <div class="bar-fill" id="hpBar"></div>
                <div class="bar-text" id="barText">20 / 20 HP</div>
            </div>
        </div>

        <div class="big-hp-display" id="mainHPLabel">20 HP</div>

        <div class="quick-damage-container">
            <button class="damage-btn" onclick="dealDamage(1)">-1</button>
            <button class="damage-btn" onclick="dealDamage(2)">-2</button>
            <button class="damage-btn" onclick="dealDamage(4)">-4</button>
            <button class="damage-btn" onclick="dealDamage(8)">-8</button>
            <button class="damage-btn" onclick="dealDamage(12)">-12</button>
        </div>

        <div class="quick-heal-container">
            <button class="heal-btn" onclick="gainHealth(1)">+1</button>
            <button class="heal-btn" onclick="gainHealth(2)">+2</button>
            <button class="heal-btn" onclick="gainHealth(4)">+4</button>
            <button class="heal-btn" onclick="gainHealth(8)">+8</button>
            <button class="heal-btn" onclick="gainHealth(12)">+12</button>
        </div>

        <div class="grid-section-title">CURRENT HEALTH GRID</div>

        <div class="health-matrix-grid" id="cardGrid"></div>

        <div class="console-box">
            <div class="console-meta">
                <div class="console-sub-heading">REDUCTION LOG</div>
                <button class="reset-action-trigger" id="resetBtn">Reset Tracker</button>
            </div>
            <div class="console-feed-column" id="logStream">
                <span class="feed-row-void" id="voidMessage">NO DAMAGE LOGGED</span>
            </div>
        </div>

        <div class="match-counters-box">
            <div class="counter-widget">
                <span class="counter-label win">Wins</span>
                <div class="counter-controls">
                    <button class="counter-btn" onclick="adjustCounter('wins', -1)">-</button>
                    <span class="counter-value" id="winsDisplay">0</span>
                    <button class="counter-btn" onclick="adjustCounter('wins', 1)">+</button>
                </div>
            </div>
            
            <div class="counter-widget">
                <span class="counter-label loss">Losses</span>
                <div class="counter-controls">
                    <button class="counter-btn" onclick="adjustCounter('losses', -1)">-</button>
                    <span class="counter-value" id="lossesDisplay">0</span>
                    <button class="counter-btn" onclick="adjustCounter('losses', 1)">+</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        let currentHP = 20;
        const maxHP = 20;

        let matchScore = {
            wins: parseInt(localStorage.getItem('scoundrel_wins')) || 0,
            losses: parseInt(localStorage.getItem('scoundrel_losses')) || 0
        };

        const mainHPLabelEl = document.getElementById('mainHPLabel');
        const hpBarEl = document.getElementById('hpBar');
        const barTextEl = document.getElementById('barText');
        const cardGridEl = document.getElementById('cardGrid');
        const logStreamEl = document.getElementById('logStream');
        const resetBtn = document.getElementById('resetBtn');
        const winsDisplayEl = document.getElementById('winsDisplay');
        const lossesDisplayEl = document.getElementById('lossesDisplay');

        function initGrid() {
            cardGridEl.innerHTML = '';
            for (let i = 1; i <= 20; i++) {
                const cell = document.createElement('button');
                cell.type = 'button';
                cell.className = 'matrix-cell';
                cell.textContent = i;
                cell.setAttribute('data-value', i);

                cell.addEventListener('click', () => updateHealth(i));
                cardGridEl.appendChild(cell);
            }
        }

        function updateHealth(targetValue) {
            if (targetValue === currentHP) return;

            if (targetValue < currentHP) {
                const reduction = currentHP - targetValue;
                logDamageEvent(reduction);
            }

            currentHP = targetValue;
            syncUI();
        }

        function dealDamage(amount) {
            if (currentHP <= 0) return;

            const targetHP = Math.max(0, currentHP - amount);
            const actualLoss = currentHP - targetHP;

            if (actualLoss > 0) {
                logDamageEvent(actualLoss);
                currentHP = targetHP;
                syncUI();
            }
        }

        function gainHealth(amount) {
            if (currentHP >= maxHP) return;

            currentHP = Math.min(maxHP, currentHP + amount);
            syncUI();
        }

        function logDamageEvent(pointsLost) {
            const initialPlaceholder = document.getElementById('voidMessage');
            if (initialPlaceholder) initialPlaceholder.remove();

            const logEntry = document.createElement('div');
            logEntry.className = 'feed-row-item';
            logEntry.textContent = `-${pointsLost} HP`;

            logStreamEl.insertBefore(logEntry, logStreamEl.firstChild);
        }

        function adjustCounter(type, change) {
            matchScore[type] = Math.max(0, matchScore[type] + change);
            localStorage.setItem(`scoundrel_${type}`, matchScore[type]);
            renderCounters();
        }

        function renderCounters() {
            winsDisplayEl.textContent = matchScore['wins'];
            lossesDisplayEl.textContent = matchScore['losses'];
        }

        function syncUI() {
            mainHPLabelEl.textContent = `${currentHP} HP`;
            barTextEl.textContent = `${currentHP} / 20 HP`;
            
            const fillRatio = (currentHP / maxHP) * 100;
            hpBarEl.style.width = `${fillRatio}%`;

            const cells = cardGridEl.querySelectorAll('.matrix-cell');
            cells.forEach(cell => {
                const cellVal = parseInt(cell.getAttribute('data-value'), 10);
                
                cell.classList.remove('lit', 'active-peak');

                if (cellVal === currentHP) {
                    cell.classList.add('active-peak');
                } else if (cellVal < currentHP) {
                    cell.classList.add('lit');
                }
            });
        }

        resetBtn.addEventListener('click', () => {
            currentHP = 20;
            logStreamEl.innerHTML = '<span class="feed-row-void" id="voidMessage">NO DAMAGE LOGGED</span>';
            syncUI();
        });

        initGrid();
        syncUI();
        renderCounters();
    </script>
</body>
</html>
